version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - erp-network

  backend:
    image: python:3.11-slim
    container_name: erp-backend
    working_dir: /app
    volumes:
      - ../backend:/app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge
